
# When num_steps is small, beta_end should be large, e.g., num_steps=100, beta_end=0.2
# vice versa, e.g., num_steps=1000, beta_end=0.002

train:
  epochs: 200
  batch_size: 64
  lr: 3.0e-3
  nsample: 100
  test_sample_num: 8 # num of samples for one day is toddim / sequence_length, here 32 are two days
  daily_num_samples: 4
  
diffusion:
  beta_start: 0.0001
  beta_end: 0.2
  channels: 128
  num_steps: 100
  schedule: "quad"

model:
  device: "cuda:0"
  featureemb: 32
  missing_pattern: "RM"
  missing_rate: 0.3
  sequence_length: 96
  toddim: 288
  save_folder: ""
  sampling_shrink_interval: 4
  time_embed: 'timeF'
  timembed_freq: "t"
  e_layers: 2 # num of timeblocks
  dropout: 0.1
  num_kernels: 6
  d_ff: 128
  top_k: 5